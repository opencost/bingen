name: Sonar

on:
  workflow_run:
    workflows: ["Build/Test"]
    types: [completed]

permissions:
  contents: read
  actions: read

jobs:
  sonar:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout repository at tested SHA
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Download coverage artifacts
        uses: actions/download-artifact@v8
        with:
          name: code-coverage
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          path: sonar-artifacts

      - name: Move coverage profile to repository root
        run: cp sonar-artifacts/coverage.out coverage.out

      - name: SonarQube Cloud Scan
        # sonarsource/sonarcloud-github-action was archived on 2025-10-22 in
        # favor of SonarSource/sonarqube-scan-action; pin to an immutable
        # commit SHA (rather than a mutable branch/tag) to avoid supply-chain
        # exposure to a force-push or tag mutation upstream.
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.scm.revision=${{ github.event.workflow_run.head_sha }}
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORG }}
