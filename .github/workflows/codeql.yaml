name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
    types: [checks_requested]
  schedule:
    - cron: "0 10 * * 1"

permissions:
  actions: read
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ["go"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          # Run the analysis purely for in-PR feedback / job-level pass-fail;
          # do not upload SARIF results to the GitHub Security tab. The
          # 'security-events: write' permission is also dropped above so the
          # workflow token cannot write security events even if a future
          # change inadvertently re-enabled upload.
          upload: never
